<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css" />
    <!-- Default theme -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/default.min.css" />
    <!-- Semantic UI theme -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/themes/semantic.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vue-select@4.0.0-beta.6/dist/vue-select.css">
</head>

<body class="bg-body-tertiary">
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-2" v-if="sesion.autenticado">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="bi bi-mortarboard-fill me-2"></i>SISTEMA ACADÉMICO
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto gap-2">
                        <a class="nav-link px-3 rounded-pill" href="#" @click="abrirVentana('alumnos')">
                            <i class="bi bi-people me-1"></i> Alumnos
                        </a>
                        <a class="nav-link px-3 rounded-pill" href="#" @click="abrirVentana('materias')">
                            <i class="bi bi-book me-1"></i> Materias
                        </a>
                        <a class="nav-link px-3 rounded-pill" href="#" @click="abrirVentana('docentes')">
                            <i class="bi bi-person-badge me-1"></i> Docentes
                        </a>
                        <a class="nav-link px-3 rounded-pill" href="#" @click="abrirVentana('matriculas')">
                            <i class="bi bi-card-checklist me-1"></i> Matriculas
                        </a>
                        <a class="nav-link px-3 rounded-pill" href="#" @click="abrirVentana('inscripciones')">
                            <i class="bi bi-journal-plus me-1"></i> Inscripciones
                        </a>
                        <div class="vr mx-2 d-none d-lg-block text-white-50"></div>
                        <a class="nav-link text-danger px-3 rounded-pill" href="#"
                            @click="sesion.autenticado = false; forms.login.mostrar = true">
                            <i class="bi bi-box-arrow-right me-1"></i> Salir
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        <div id="appSistema" class="container py-4">
            <login v-if="forms.login.mostrar" :forms="forms"></login>

            <div v-if="sesion.autenticado">
                <alumnos @buscar='buscar("busqueda_alumnos","obtenerAlumnos")' :forms="forms" ref="alumnos"
                    v-show="forms.alumnos.mostrar"></alumnos>
                <busqueda_alumnos @modificar='modificar("alumnos","modificarAlumno", $event)' ref="busqueda_alumnos"
                    v-show="forms.busqueda_alumnos.mostrar"></busqueda_alumnos>

                <materias @buscar='buscar("busqueda_materias","obtenerMaterias")' :forms="forms" ref="materias"
                    v-show="forms.materias.mostrar"></materias>
                <busqueda_materias @modificar='modificar("materias","modificarMateria", $event)' ref="busqueda_materias"
                    v-show="forms.busqueda_materias.mostrar"></busqueda_materias>

                <docentes @buscar='buscar("busqueda_docentes","obtenerDocentes")' :forms="forms" ref="docentes"
                    v-show="forms.docentes.mostrar"></docentes>
                <busqueda_docentes @modificar='modificar("docentes","modificarDocente", $event)' ref="busqueda_docentes"
                    v-show="forms.busqueda_docentes.mostrar"></busqueda_docentes>

                <matriculas @buscar='buscar("busqueda_matriculas","obtenerMatriculas")' :forms="forms" ref="matriculas"
                    v-show="forms.matriculas.mostrar"></matriculas>
                <busqueda_matriculas @modificar='modificar("matriculas","modificarMatricula", $event)'
                    ref="busqueda_matriculas" v-show="forms.busqueda_matriculas.mostrar"></busqueda_matriculas>

                <inscripciones @buscar='buscar("busqueda_inscripciones","obtenerInscripciones")' :forms="forms"
                    ref="inscripciones" v-show="forms.inscripciones.mostrar"></inscripciones>
                <busqueda_inscripciones @modificar='modificar("inscripciones","modificarInscripcion", $event)'
                    ref="busqueda_inscripciones" v-show="forms.busqueda_inscripciones.mostrar"></busqueda_inscripciones>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.2.0/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-select@4.0.0-beta.6/dist/vue-select.umd.js"></script>

    <script src="componentes/login.js"></script>
    <script src="componentes/alumnos.js"></script>
    <script src="componentes/busqueda_alumnos.js"></script>
    <script src="componentes/materias.js"></script>
    <script src="componentes/busqueda_materias.js"></script>
    <script src="componentes/docentes.js"></script>
    <script src="componentes/busqueda_docentes.js"></script>
    <script src="componentes/matriculas.js"></script>
    <script src="componentes/busqueda_matriculas.js"></script>
    <script src="componentes/inscripciones.js"></script>
    <script src="componentes/busqueda_inscripciones.js"></script>
    <script src="main.js"></script>
</body>

</html>
